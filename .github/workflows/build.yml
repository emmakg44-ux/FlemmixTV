name: Build APK
on: [push]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore flemmix.jks \
            -alias flemmix -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -dname "CN=Flemmix, OU=TV, O=Flemmix, L=City, S=State, C=US" \
            -storepass flemmix123 -keypass flemmix123

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/flemmix.jks \
            -Pandroid.injected.signing.store.password=flemmix123 \
            -Pandroid.injected.signing.key.alias=flemmix \
            -Pandroid.injected.signing.key.password=flemmix123

      - uses: actions/upload-artifact@v4
        with:
          name: FlemmixTV-APK
          path: app/build/outputs/apk/release/app-release.apk
